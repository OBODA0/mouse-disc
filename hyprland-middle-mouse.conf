# Mouse Disc - Middle Mouse Activation for Hyprland
# Add these to your ~/.config/hypr/hyprland.conf

# Window rules for mouse-disc (makes it look like a radial overlay)
windowrulev2 = float,class:^(mouse-disc)$
windowrulev2 = noborder,class:^(mouse-disc)$
windowrulev2 = noshadow,class:^(mouse-disc)$
windowrulev2 = animation slide,class:^(mouse-disc)$
windowrulev2 = center,class:^(mouse-disc)$
windowrulev2 = size 320 320,class:^(mouse-disc)$

# Middle mouse button activation (button 274 = middle click)
# This binds middle click anywhere to open the disc
bind = , mouse:274, exec, python3 ~/Projects/mouse-disc/main.py --show

# Alternative: Only on desktop (not on windows) - use this if middle-click interferes with apps
# bindm = , mouse:274, exec, python3 ~/Projects/mouse-disc/main.py --show

# Note: If middle-click pastes in your terminal, you may need to disable that:
# In kitty.conf: mouse_map middle click ungrabbed
# In other terminals, check their settings
