# Mouse Disc Hyprland Integration
# Add these lines to your hyprland.conf

# Auto-start Mouse Disc in tray mode (keeps daemon warm for instant show)
exec-once = python3 ~/Projects/mouse-disc/main.py

# Window rules for mouse-disc
windowrulev2 = float,class:^(mouse-disc)$
windowrulev2 = nofocus,class:^(mouse-disc)$
windowrulev2 = noshadow,class:^(mouse-disc)$
windowrulev2 = noborder,class:^(mouse-disc)$
windowrulev2 = center,class:^(mouse-disc)$
windowrulev2 = animation slide,class:^(mouse-disc)$

# Bind middle mouse button to show mouse-disc instantly
bind = , mouse:274, exec, python3 ~/Projects/mouse-disc/main.py --show

# Alternative: keyboard shortcut
# bind = $mainMod, M, exec, python3 ~/Projects/mouse-disc/main.py --show
