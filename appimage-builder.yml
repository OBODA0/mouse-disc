# AppImage Builder Recipe for Mouse Disc
version: 1

script:
  # Create AppDir structure
  - rm -rf AppDir | true
  - mkdir -p AppDir/usr/src
  - cp -r main.py config.py core tabs mouse-disc requirements.txt AppDir/usr/src/
  - mkdir -p AppDir/usr/bin
  - ln -s ../src/mouse-disc AppDir/usr/bin/mouse-disc
  - mkdir -p AppDir/usr/share/applications
  - cp mouse-disc.desktop AppDir/usr/share/applications/
  - mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
  - cp icon.png AppDir/usr/share/icons/hicolor/256x256/apps/mouse-disc.png || true

AppDir:
  path: ./AppDir

  app_info:
    id: com.github.oboda0.mouse-disc
    name: mouse-disc
    icon: mouse-disc
    version: "1.0.0"
    exec: usr/bin/mouse-disc
    exec_args: "$@"

  apt:
    arch: amd64
    sources:
      - sourceline: 'deb [arch=amd64] http://archive.ubuntu.com/ubuntu/ jammy main restricted universe multiverse'
        key_url: 'http://keyserver.ubuntu.com/pks/lookup?op=get&search=0x871920D1991BC93C'
    include:
      - python3
      - python3-pip
      - libxkbcommon-x11-0
      - libxcb-icccm4
      - libxcb-image0
      - libxcb-keysyms1
      - libxcb-randr0
      - libxcb-render-util0

  runtime:
    env:
      PYTHONPATH: "${APPDIR}/usr/src:${PYTHONPATH}"
      PATH: "${APPDIR}/usr/bin:${PATH}"

  test:
    fedora-30:
      image: appimagecrafters/tests-env:fedora-30
      command: ./AppRun --help || true
    debian-stable:
      image: appimagecrafters/tests-env:debian-stable
      command: ./AppRun --help || true

AppImage:
  arch: x86_64
  update-information: "gh-releases-zsync|OBODA0|mouse-disc|latest|mouse-disc-*x86_64.AppImage.zsync"
  sign-key: None
